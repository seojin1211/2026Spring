<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Recovery Support Dashboard</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      margin: 0;
    }
    header {
      background: #4a90e2;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 20px;
    }
    .container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      padding: 20px;
    }
    .card {
      background: white;
      padding: 15px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    h3 { margin-top: 0; }
    .status {
      font-size: 18px;
      margin: 10px 0;
    }
    button {
      padding: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #4a90e2;
      color: white;
    }
    .chat-box {
      height: 200px;
      overflow-y: auto;
      border: 1px solid #ddd;
      padding: 10px;
      margin-bottom: 10px;
    }
    .message {
      margin-bottom: 8px;
    }
    input {
      width: 80%;
      padding: 8px;
    }
  </style>
</head>
<body>

<header>
  회복 지원 인터랙티브 대시보드
</header>

<div class="container">

  <div class="card">
    <h3>중독 상태</h3>
    <div class="status" id="addictionLevel">현재 상태: 중간</div>
    <button onclick="increaseRisk()">위험 증가</button>
    <button onclick="decreaseRisk()">회복 진행</button>
  </div>

  <div class="card">
    <h3>치료 진행 상황</h3>
    <div class="status" id="treatmentProgress">진행률: 40%</div>
    <button onclick="progressUp()">진행 +10%</button>
  </div>

  <div class="card">
    <h3>유혹 관리</h3>
    <div class="status" id="urgeLevel">현재 욕구: 보통</div>
    <button onclick="reduceUrge()">욕구 낮추기</button>
  </div>

  <div class="card">
    <h3>익명 채팅</h3>
    <div class="chat-box" id="chatBox"></div>
    <input type="text" id="chatInput" placeholder="메시지 입력...">
    <button onclick="sendMessage()">전송</button>
  </div>

</div>

<script>
  let addiction = 2; // 1 낮음, 2 중간, 3 높음
  let progress = 40;
  let urge = 2;

  function updateAddiction() {
    const text = ["낮음", "중간", "높음"];
    document.getElementById("addictionLevel").innerText = "현재 상태: " + text[addiction-1];
  }

  function increaseRisk() {
    if (addiction < 3) addiction++;
    updateAddiction();
  }

  function decreaseRisk() {
    if (addiction > 1) addiction--;
    updateAddiction();
  }

  function progressUp() {
    if (progress < 100) progress += 10;
    document.getElementById("treatmentProgress").innerText = "진행률: " + progress + "%";
  }

  function reduceUrge() {
    if (urge > 1) urge--;
    const text = ["낮음", "보통", "높음"];
    document.getElementById("urgeLevel").innerText = "현재 욕구: " + text[urge-1];
  }

  function sendMessage() {
    const input = document.getElementById("chatInput");
    const box = document.getElementById("chatBox");

    if (input.value.trim() === "") return;

    const msg = document.createElement("div");
    msg.className = "message";
    msg.innerText = "나: " + input.value;

    box.appendChild(msg);
    input.value = "";
    box.scrollTop = box.scrollHeight;

    setTimeout(() => {
      const reply = document.createElement("div");
      reply.className = "message";
      reply.innerText = "상담봇: 계속 잘하고 있어요. 힘들면 쉬어가도 괜찮아요.";
      box.appendChild(reply);
      box.scrollTop = box.scrollHeight;
    }, 1000);
  }
</script>

</body>
</html>
